url: https://eguizarrosales.github.io/YouAnalyser/
template:
  bootstrap: 5

reference:
  - title: Data Processing
    desc: >
      Function to process survey data, including adding and inspecting 
      variable and value labels.
  - contents:
    - starts_with("dp_")
  - title: Exploratory Data Analysis (EDA)
    desc: >
      Functions to perform exploratory data analysis (EDA) on survey data, 
      including summary statistics and correlations.
  - contents:
    - starts_with("eda_")
  - title: Key Driver Analysis (KDA)
    desc: >
      Functions to perform KDA on survey data. `kda_regression()` is the main
      end-to-end function that runs the entire KDA process, while the other functions
      are helper functions that can be used to run specific steps of the KDA process.
  - contents:
    - starts_with("kda_")
  - title: YouAnalyser (YA) Utility Functions
    desc: >
      Miscellaneous utility functions for the YouAnalyser package.
  - contents:
      - starts_with("ya_")
  - title: Example Data
    desc: >
      Example datasets included in the YouAnalyser package.
  - contents:
      - starts_with("bkw_")
